<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KidForever Cards — Print Sheet</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f0f0f0;font-family:'Segoe UI',Arial,sans-serif;padding:20px;}
h1{font-size:1rem;margin-bottom:4px;color:#333;}
p{font-size:0.7rem;color:#666;margin-bottom:16px;}
.sheet{display:grid;grid-template-columns:repeat(3,180px);gap:10px;justify-content:center;margin-bottom:16px;}
.cut-line{border:1px dashed #ccc;margin:14px 0;}
.instructions{font-size:0.65rem;color:#888;margin:8px 0;text-align:center;}
@media print{
  body{padding:6px;background:#fff;}
  h1,p,.instructions,.no-print{display:none;}
  .cut-line{border-color:#ddd;}
}
</style>
</head>
<body>
<h1>KidForever Cards — Print Sheet</h1>
<p>Print on cardstock · Cut out · 5 per envelope · Sell for $5</p>
<button class="no-print" onclick="window.print()" style="margin-bottom:16px;padding:10px 28px;background:linear-gradient(135deg,#ffcc00,#ff2244);border:none;border-radius:50px;font-size:0.8rem;font-weight:900;cursor:pointer;">🖨️ PRINT NOW</button>

<div class="instructions">✂️ CARD FRONTS</div>
<div class="sheet" id="fronts"></div>
<div class="cut-line"></div>
<div class="instructions">✂️ CARD BACKS — print on reverse side</div>
<div class="sheet" id="backs"></div>

<script>
const CARDS = [
  {
    name:"OLIVER", world:"KIDRISING", rarity:"LEGENDARY", hp:200,
    atk:99, def:99, spd:99,
    move:"Thunder Crown", moveDmg:120,
    desc:"Chosen hero of KidRising. His crown charges with lightning when he believes.",
    borderTop:"#ffcc00", borderBot:"#ff8800",
    bgScene: drawOliverScene,
    charFn: drawOliver,
  },
  {
    name:"THE BOSS", world:"HYPERBLAST", rarity:"LEGENDARY", hp:190,
    atk:99, def:88, spd:70,
    move:"Inferno Crush", moveDmg:110,
    desc:"Ancient dragon warlord. His fire melts steel and his roar shakes worlds.",
    borderTop:"#ff2244", borderBot:"#880011",
    bgScene: drawDragonScene,
    charFn: drawDragon,
  },
  {
    name:"PUFFBLAZE", world:"KIDFOREVER", rarity:"LEGENDARY", hp:180,
    atk:95, def:70, spd:85,
    move:"Puff Explosion", moveDmg:100,
    desc:"Cute but deadly. Stores fire in its cheeks and unleashes it all at once.",
    borderTop:"#bb33ff", borderBot:"#660099",
    bgScene: drawPuffScene,
    charFn: drawPuff,
  },
  {
    name:"HYPERBOT", world:"HYPERBLAST", rarity:"EPIC", hp:150,
    atk:85, def:60, spd:75,
    move:"Laser Blast", moveDmg:85,
    desc:"Military-grade battle robot. Scanning for targets 24/7.",
    borderTop:"#0088ff", borderBot:"#003399",
    bgScene: drawCityScene,
    charFn: drawHyperbot,
  },
  {
    name:"SHADOWKID", world:"EPICWORLD", rarity:"EPIC", hp:140,
    atk:78, def:55, spd:88,
    move:"Dark Strike", moveDmg:80,
    desc:"Moves through shadows unseen. Strikes before you even know he's there.",
    borderTop:"#9900cc", borderBot:"#330044",
    bgScene: drawNightScene,
    charFn: drawShadow,
  },
  {
    name:"LUNA", world:"FLUFFLAND", rarity:"RARE", hp:110,
    atk:40, def:70, spd:90,
    move:"Wind Spiral", moveDmg:55,
    desc:"Dances on the wind at impossible speeds. Nearly impossible to catch.",
    borderTop:"#2255ff", borderBot:"#001188",
    bgScene: drawSkyScene,
    charFn: drawLuna,
  },
  {
    name:"TANK BOT", world:"HYPERBLAST", rarity:"RARE", hp:130,
    atk:60, def:95, spd:25,
    move:"Iron Shield", moveDmg:60,
    desc:"Absorbs any attack. Slow but completely unstoppable once rolling.",
    borderTop:"#888899", borderBot:"#333344",
    bgScene: drawBattleScene,
    charFn: drawTankBot,
  },
  {
    name:"ZAPPER", world:"HYPERBLAST", rarity:"COMMON", hp:90,
    atk:45, def:30, spd:70,
    move:"Shock Bite", moveDmg:40,
    desc:"Electric eel creature. Zaps anything it touches by accident.",
    borderTop:"#cc8800", borderBot:"#664400",
    bgScene: drawStormScene,
    charFn: drawZapper,
  },
  {
    name:"SHELLY", world:"FLUFFLAND", rarity:"COMMON", hp:100,
    atk:30, def:99, spd:20,
    move:"Shell Guard", moveDmg:25,
    desc:"Retreats into her shell and becomes practically indestructible.",
    borderTop:"#228833", borderBot:"#114422",
    bgScene: drawGrassScene,
    charFn: drawShelly,
  },
];

const RARITY_COLOR = {LEGENDARY:"#ffcc00", EPIC:"#bb33ff", RARE:"#2255ff", COMMON:"#aaaacc"};

// ── SCENE BACKGROUNDS ──────────────────────────────────────────────────────────

function drawOliverScene(ctx,W,H){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#1a0a00");g.addColorStop(1,"#2a1500");
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // stars
  for(let i=0;i<40;i++){ctx.fillStyle=`rgba(255,204,0,${Math.random()*0.6+0.2})`;ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H*0.7,Math.random()*1.2+0.3,0,Math.PI*2);ctx.fill();}
  // energy lines
  ctx.strokeStyle="rgba(255,204,0,0.15)";ctx.lineWidth=1;
  for(let i=0;i<8;i++){ctx.beginPath();ctx.moveTo(W/2,H/2);ctx.lineTo(Math.random()*W,Math.random()*H);ctx.stroke();}
  // ground glow
  const gg=ctx.createRadialGradient(W/2,H,0,W/2,H,W);
  gg.addColorStop(0,"rgba(255,204,0,0.3)");gg.addColorStop(1,"transparent");
  ctx.fillStyle=gg;ctx.fillRect(0,H*0.65,W,H*0.35);
}

function drawDragonScene(ctx,W,H){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#0a0000");g.addColorStop(1,"#220005");
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // lava cracks
  ctx.strokeStyle="rgba(255,80,0,0.4)";ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,H);ctx.lineTo(30,H-20);ctx.lineTo(50,H-10);ctx.lineTo(80,H-30);ctx.lineTo(W,H-15);ctx.stroke();
  ctx.beginPath();ctx.moveTo(10,H);ctx.lineTo(40,H-25);ctx.lineTo(70,H-8);ctx.lineTo(W-10,H-20);ctx.stroke();
  // fire glow
  const fg=ctx.createRadialGradient(W/2,H*0.5,0,W/2,H*0.5,80);
  fg.addColorStop(0,"rgba(255,80,0,0.25)");fg.addColorStop(1,"transparent");
  ctx.fillStyle=fg;ctx.fillRect(0,0,W,H);
  // embers
  for(let i=0;i<25;i++){ctx.fillStyle=`rgba(255,${Math.floor(Math.random()*100)},0,${Math.random()*0.7+0.2})`;ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H,Math.random()*2,0,Math.PI*2);ctx.fill();}
}

function drawPuffScene(ctx,W,H){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#0a0018");g.addColorStop(1,"#160030");
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // magic sparkles
  for(let i=0;i<35;i++){
    const x=Math.random()*W,y=Math.random()*H;
    ctx.fillStyle=i%3===0?"rgba(255,204,0,0.7)":i%3===1?"rgba(187,51,255,0.6)":"rgba(255,100,200,0.5)";
    ctx.beginPath();ctx.arc(x,y,Math.random()*2,0,Math.PI*2);ctx.fill();
  }
  const mg=ctx.createRadialGradient(W/2,H*0.5,0,W/2,H*0.5,70);
  mg.addColorStop(0,"rgba(187,51,255,0.2)");mg.addColorStop(1,"transparent");
  ctx.fillStyle=mg;ctx.fillRect(0,0,W,H);
}

function drawCityScene(ctx,W,H){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#000510");g.addColorStop(1,"#001030");
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // city buildings silhouette
  ctx.fillStyle="#000820";
  const buildings=[[0,H-30,20,30],[22,H-50,18,50],[42,H-35,15,35],[59,H-60,22,60],[83,H-40,16,40],[101,H-55,20,55],[123,H-30,17,30],[142,H-45,W-142,45]];
  buildings.forEach(([x,y,w,h])=>{ctx.fillRect(x,y,w,h);});
  // building windows
  ctx.fillStyle="rgba(0,200,255,0.6)";
  for(let i=0;i<30;i++){ctx.fillRect(Math.random()*(W-4),H-60+Math.random()*45,2,2);}
  // scan line
  ctx.strokeStyle="rgba(0,150,255,0.3)";ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,H*0.5);ctx.lineTo(W,H*0.5);ctx.stroke();
}

function drawNightScene(ctx,W,H){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#030008");g.addColorStop(1,"#0a001a");
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // moon
  ctx.fillStyle="rgba(220,200,255,0.15)";ctx.beginPath();ctx.arc(W-25,20,16,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#030008";ctx.beginPath();ctx.arc(W-19,18,13,0,Math.PI*2);ctx.fill();
  // stars
  for(let i=0;i<30;i++){ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.5+0.1})`;ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H*0.8,Math.random()*1,0,Math.PI*2);ctx.fill();}
  // shadow pools on ground
  ctx.fillStyle="rgba(80,0,120,0.3)";ctx.beginPath();ctx.ellipse(W/2,H-8,50,8,0,0,Math.PI*2);ctx.fill();
}

function drawSkyScene(ctx,W,H){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#000c2a");g.addColorStop(0.6,"#001050");g.addColorStop(1,"#001880");
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // clouds
  ctx.fillStyle="rgba(100,160,255,0.12)";
  [[20,30,40,15],[70,20,55,18],[30,50,35,12],[100,40,45,14]].forEach(([x,y,rx,ry])=>{ctx.beginPath();ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2);ctx.fill();});
  // stars
  for(let i=0;i<20;i++){ctx.fillStyle=`rgba(200,220,255,${Math.random()*0.6+0.2})`;ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H*0.5,Math.random()*1,0,Math.PI*2);ctx.fill();}
}

function drawBattleScene(ctx,W,H){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#080808");g.addColorStop(1,"#181818");
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // explosion marks
  ctx.strokeStyle="rgba(255,150,0,0.15)";ctx.lineWidth=1;
  for(let i=0;i<12;i++){const a=i*30*Math.PI/180;ctx.beginPath();ctx.moveTo(W/2,H/2);ctx.lineTo(W/2+Math.cos(a)*80,H/2+Math.sin(a)*80);ctx.stroke();}
  // ground cracks
  ctx.strokeStyle="rgba(150,150,200,0.2)";ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,H-10);ctx.lineTo(W/3,H-25);ctx.lineTo(W*0.6,H-12);ctx.lineTo(W,H-20);ctx.stroke();
}

function drawStormScene(ctx,W,H){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#0a0800");g.addColorStop(1,"#1a1200");
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // lightning bolts in bg
  ctx.strokeStyle="rgba(255,204,0,0.12)";ctx.lineWidth=1;
  [[10,0,20,H],[50,0,40,H],[90,0,100,H],[130,0,120,H]].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo((x1+x2)/2,H/2);ctx.lineTo(x2,y2);ctx.stroke();});
  // electric aura
  const eg=ctx.createRadialGradient(W/2,H*0.5,0,W/2,H*0.5,60);
  eg.addColorStop(0,"rgba(255,204,0,0.15)");eg.addColorStop(1,"transparent");
  ctx.fillStyle=eg;ctx.fillRect(0,0,W,H);
}

function drawGrassScene(ctx,W,H){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#001a08");g.addColorStop(1,"#003010");
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // grass blades
  ctx.strokeStyle="rgba(50,180,80,0.35)";ctx.lineWidth=1.5;
  for(let i=0;i<20;i++){const x=Math.random()*W;ctx.beginPath();ctx.moveTo(x,H);ctx.quadraticCurveTo(x+Math.random()*10-5,H-20,x+Math.random()*8-4,H-30);ctx.stroke();}
  // fireflies
  for(let i=0;i<15;i++){ctx.fillStyle=`rgba(100,255,100,${Math.random()*0.5+0.2})`;ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H*0.8,Math.random()*1.5,0,Math.PI*2);ctx.fill();}
}

// ── CHARACTER ART ──────────────────────────────────────────────────────────────

function drawOliver(ctx,cx,cy,s){
  // cape
  ctx.fillStyle="#ffaa00";ctx.beginPath();ctx.moveTo(cx-20*s,cy-5*s);ctx.quadraticCurveTo(cx-28*s,cy+25*s,cx-22*s,cy+45*s);ctx.lineTo(cx+22*s,cy+45*s);ctx.quadraticCurveTo(cx+28*s,cy+25*s,cx+20*s,cy-5*s);ctx.fill();
  // body
  ctx.fillStyle="#ffd700";ctx.beginPath();ctx.roundRect(cx-14*s,cy-5*s,28*s,30*s,5*s);ctx.fill();
  // chest star
  ctx.fillStyle="#ff2244";
  const sp=[[cx,cy+2*s],[cx+4*s,cy+10*s],[cx+12*s,cy+10*s],[cx+5*s,cy+15*s],[cx+8*s,cy+23*s],[cx,cy+18*s],[cx-8*s,cy+23*s],[cx-5*s,cy+15*s],[cx-12*s,cy+10*s],[cx-4*s,cy+10*s]];
  ctx.beginPath();sp.forEach(([x,y],i)=>i?ctx.lineTo(x,y):ctx.moveTo(x,y));ctx.closePath();ctx.fill();
  // head
  ctx.fillStyle="#ffe0b2";ctx.beginPath();ctx.arc(cx,cy-18*s,14*s,0,Math.PI*2);ctx.fill();
  // hair
  ctx.fillStyle="#4a2800";ctx.beginPath();ctx.moveTo(cx-14*s,cy-22*s);ctx.quadraticCurveTo(cx,cy-36*s,cx+14*s,cy-22*s);ctx.quadraticCurveTo(cx+8*s,cy-28*s,cx,cy-26*s);ctx.quadraticCurveTo(cx-8*s,cy-28*s,cx-14*s,cy-22*s);ctx.fill();
  // eyes
  [[cx-5*s,cy-18*s],[cx+5*s,cy-18*s]].forEach(([ex,ey])=>{ctx.fillStyle="#222";ctx.beginPath();ctx.arc(ex,ey,3*s,0,Math.PI*2);ctx.fill();ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(ex-0.8*s,ey-0.8*s,1*s,0,Math.PI*2);ctx.fill();});
  // smile
  ctx.strokeStyle="#c8703a";ctx.lineWidth=1.5*s;ctx.beginPath();ctx.arc(cx,cy-15*s,5*s,0.2,Math.PI-0.2);ctx.stroke();
  // crown
  ctx.fillStyle="#ffcc00";ctx.beginPath();ctx.moveTo(cx-10*s,cy-31*s);ctx.lineTo(cx-8*s,cy-40*s);ctx.lineTo(cx-3*s,cy-34*s);ctx.lineTo(cx,cy-42*s);ctx.lineTo(cx+3*s,cy-34*s);ctx.lineTo(cx+8*s,cy-40*s);ctx.lineTo(cx+10*s,cy-31*s);ctx.closePath();ctx.fill();
  // lightning arms
  ctx.strokeStyle="#ffcc00";ctx.lineWidth=2.5*s;ctx.lineCap="round";
  ctx.beginPath();ctx.moveTo(cx-14*s,cy);ctx.lineTo(cx-25*s,cy+10*s);ctx.lineTo(cx-20*s,cy+12*s);ctx.lineTo(cx-28*s,cy+25*s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+14*s,cy);ctx.lineTo(cx+25*s,cy+10*s);ctx.lineTo(cx+20*s,cy+12*s);ctx.lineTo(cx+28*s,cy+25*s);ctx.stroke();
}

function drawDragon(ctx,cx,cy,s){
  // tail
  ctx.fillStyle="#cc1122";ctx.beginPath();ctx.moveTo(cx+15*s,cy+20*s);ctx.quadraticCurveTo(cx+45*s,cy+5*s,cx+50*s,cy-10*s);ctx.quadraticCurveTo(cx+52*s,cy-20*s,cx+40*s,cy-18*s);ctx.quadraticCurveTo(cx+45*s,cy-8*s,cx+35*s,cy+5*s);ctx.quadraticCurveTo(cx+20*s,cy+15*s,cx+15*s,cy+20*s);ctx.fill();
  // wings
  ctx.fillStyle="#8b0000";
  ctx.beginPath();ctx.moveTo(cx-10*s,cy-5*s);ctx.quadraticCurveTo(cx-50*s,cy-30*s,cx-45*s,cy-50*s);ctx.quadraticCurveTo(cx-30*s,cy-35*s,cx-10*s,cy+5*s);ctx.fill();
  ctx.beginPath();ctx.moveTo(cx+10*s,cy-5*s);ctx.quadraticCurveTo(cx+50*s,cy-30*s,cx+45*s,cy-50*s);ctx.quadraticCurveTo(cx+30*s,cy-35*s,cx+10*s,cy+5*s);ctx.fill();
  // wing highlight
  ctx.fillStyle="rgba(255,50,50,0.3)";
  ctx.beginPath();ctx.moveTo(cx-10*s,cy-5*s);ctx.quadraticCurveTo(cx-40*s,cy-28*s,cx-38*s,cy-44*s);ctx.quadraticCurveTo(cx-28*s,cy-32*s,cx-10*s,cy+2*s);ctx.fill();
  // body
  ctx.fillStyle="#cc1122";ctx.beginPath();ctx.ellipse(cx,cy+10*s,20*s,25*s,0,0,Math.PI*2);ctx.fill();
  // belly
  ctx.fillStyle="#ff6644";ctx.beginPath();ctx.ellipse(cx,cy+15*s,13*s,18*s,0,0,Math.PI*2);ctx.fill();
  // neck
  ctx.fillStyle="#cc1122";ctx.beginPath();ctx.moveTo(cx-8*s,cy-12*s);ctx.lineTo(cx+8*s,cy-12*s);ctx.lineTo(cx+6*s,cy-28*s);ctx.lineTo(cx-6*s,cy-28*s);ctx.fill();
  // head
  ctx.fillStyle="#cc1122";ctx.beginPath();ctx.ellipse(cx,cy-36*s,16*s,13*s,0,0,Math.PI*2);ctx.fill();
  // horns
  ctx.fillStyle="#880000";ctx.beginPath();ctx.moveTo(cx-8*s,cy-46*s);ctx.lineTo(cx-12*s,cy-58*s);ctx.lineTo(cx-5*s,cy-47*s);ctx.fill();
  ctx.beginPath();ctx.moveTo(cx+8*s,cy-46*s);ctx.lineTo(cx+12*s,cy-58*s);ctx.lineTo(cx+5*s,cy-47*s);ctx.fill();
  // eyes
  [[cx-6*s,cy-37*s],[cx+6*s,cy-37*s]].forEach(([ex,ey])=>{ctx.fillStyle="#ff8800";ctx.beginPath();ctx.arc(ex,ey,4*s,0,Math.PI*2);ctx.fill();ctx.fillStyle="#111";ctx.beginPath();ctx.ellipse(ex,ey,2*s,3*s,0,0,Math.PI*2);ctx.fill();ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(ex-1*s,ey-1*s,0.8*s,0,Math.PI*2);ctx.fill();});
  // fire
  ctx.fillStyle="#ffcc00";ctx.beginPath();ctx.moveTo(cx-3*s,cy-28*s);ctx.quadraticCurveTo(cx-8*s,cy-20*s,cx-5*s,cy-14*s);ctx.quadraticCurveTo(cx,cy-18*s,cx+5*s,cy-14*s);ctx.quadraticCurveTo(cx+8*s,cy-20*s,ctx+3*s,cy-28*s);ctx.fill();
  ctx.fillStyle="#ff4400";ctx.beginPath();ctx.moveTo(cx,cy-25*s);ctx.quadraticCurveTo(cx-6*s,cy-18*s,cx-4*s,cy-12*s);ctx.quadraticCurveTo(cx,cy-15*s,cx+4*s,cy-12*s);ctx.quadraticCurveTo(cx+6*s,cy-18*s,cx,cy-25*s);ctx.fill();
}

function drawPuff(ctx,cx,cy,s){
  // fluffy outline bumps
  const bumps=[[cx-20*s,cy-15*s,12*s],[cx+20*s,cy-15*s,12*s],[cx,cy-28*s,12*s],[cx-22*s,cy+5*s,10*s],[cx+22*s,cy+5*s,10*s],[cx-14*s,cy+18*s,9*s],[cx+14*s,cy+18*s,9*s]];
  ctx.fillStyle="#aa22dd";
  bumps.forEach(([bx,by,br])=>{ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();});
  // body
  ctx.fillStyle="#cc44ff";ctx.beginPath();ctx.arc(cx,cy,22*s,0,Math.PI*2);ctx.fill();
  // belly
  ctx.fillStyle="rgba(255,180,255,0.45)";ctx.beginPath();ctx.ellipse(cx,cy+5*s,13*s,10*s,0,0,Math.PI*2);ctx.fill();
  // eyes
  [[cx-7*s,cy-3*s],[cx+7*s,cy-3*s]].forEach(([ex,ey])=>{ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(ex,ey,5*s,0,Math.PI*2);ctx.fill();ctx.fillStyle="#222";ctx.beginPath();ctx.arc(ex,ey,3*s,0,Math.PI*2);ctx.fill();ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(ex-1.2*s,ey-1.2*s,1.2*s,0,Math.PI*2);ctx.fill();});
  // blush
  ctx.fillStyle="rgba(255,80,180,0.4)";ctx.beginPath();ctx.ellipse(cx-14*s,cy+5*s,5*s,3*s,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cx+14*s,cy+5*s,5*s,3*s,0,0,Math.PI*2);ctx.fill();
  // smile
  ctx.strokeStyle="#994499";ctx.lineWidth=2*s;ctx.beginPath();ctx.arc(cx,cy+3*s,5*s,0.1,Math.PI-0.1);ctx.stroke();
  // fire on head

// ── CARD BUILDER ───────────────────────────────────────────────────────────────

function buildCard(card){
  const W=180,H=252;
  const c=document.createElement("canvas");
  c.width=W;c.height=H;
  const ctx=c.getContext("2d");

  // rounded clip
  ctx.save();
  ctx.beginPath();
  ctx.roundRect(0,0,W,H,12);
  ctx.clip();

  // OUTER BORDER GRADIENT (rarity color)
  const rc=RARITY_COLOR[card.rarity];
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,rc);bg.addColorStop(0.5,"#111122");bg.addColorStop(1,card.borderBot);
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // INNER CARD AREA
  ctx.fillStyle="#0a0a1a";
  ctx.beginPath();ctx.roundRect(5,5,W-10,H-10,9);ctx.fill();

  // HEADER BAR
  const hg=ctx.createLinearGradient(0,5,W,40);
  hg.addColorStop(0,card.borderTop);hg.addColorStop(1,card.borderBot);
  ctx.fillStyle=hg;ctx.fillRect(5,5,W-10,32);

  // Name
  ctx.fillStyle="#fff";ctx.font=`900 11px 'Segoe UI',Arial`;ctx.textAlign="left";
  ctx.shadowColor=card.borderTop;ctx.shadowBlur=8;
  ctx.fillText(card.name,12,24);ctx.shadowBlur=0;

  // HP
  ctx.fillStyle="#fff";ctx.font=`900 10px Arial`;ctx.textAlign="right";
  ctx.fillText(`HP ${card.hp}`,W-10,24);

  // Rarity badge
  ctx.font=`700 6px Arial`;ctx.textAlign="left";ctx.fillStyle=rc;
  ctx.letterSpacing="2px";
  ctx.fillText(card.rarity,12,35);ctx.letterSpacing="0px";

  // ART FRAME
  const artY=38,artH=110;
  ctx.fillStyle="#050510";ctx.fillRect(5,artY,W-10,artH);
  // draw scene background
  ctx.save();ctx.rect(5,artY,W-10,artH);ctx.clip();
  card.bgScene(ctx,W,artH);
  // draw character centered in art box
  card.charFn(ctx,W/2,artY+artH*0.6,0.85);
  ctx.restore();

  // art frame border
  ctx.strokeStyle=rc;ctx.lineWidth=1.5;ctx.globalAlpha=0.6;
  ctx.strokeRect(5,artY,W-10,artH);ctx.globalAlpha=1;

  // WORLD TAG
  ctx.fillStyle=rc;ctx.globalAlpha=0.15;ctx.fillRect(5,artY+artH,W-10,16);ctx.globalAlpha=1;
  ctx.font=`700 7px Arial`;ctx.textAlign="center";ctx.fillStyle=rc;
  ctx.fillText("◆ "+card.world+" ◆",W/2,artY+artH+11);

  // DIVIDER
  ctx.strokeStyle=rc;ctx.globalAlpha=0.3;ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(10,artY+artH+17);ctx.lineTo(W-10,artY+artH+17);ctx.stroke();ctx.globalAlpha=1;

  // MOVE SECTION
  const moveY=artY+artH+22;
  ctx.font=`900 8px Arial`;ctx.textAlign="left";ctx.fillStyle="#fff";
  ctx.fillText("⚡  "+card.move,12,moveY);
  ctx.font=`900 10px Arial`;ctx.textAlign="right";ctx.fillStyle=rc;
  ctx.fillText(card.moveDmg,W-10,moveY);

  // move desc
  ctx.font=`9px Arial`;ctx.fillStyle="rgba(200,200,220,0.75)";ctx.textAlign="left";
  const words=card.desc.split(" ");let line="",lineY=moveY+13;
  words.forEach(w=>{
    const test=line+w+" ";
    if(ctx.measureText(test).width>W-22&&line){ctx.fillText(line.trim(),12,lineY);line=w+" ";lineY+=11;}
    else line=test;
  });
  if(line)ctx.fillText(line.trim(),12,lineY);

  // STATS BAR
  const statsY=H-28;
  ctx.fillStyle="rgba(0,0,0,0.4)";ctx.fillRect(5,statsY-8,W-10,36);
  // divider
  ctx.strokeStyle=rc;ctx.globalAlpha=0.25;ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(10,statsY-10);ctx.lineTo(W-10,statsY-10);ctx.stroke();ctx.globalAlpha=1;

  const stats=[["ATK",card.atk,"#ff4444"],["DEF",card.def,"#4488ff"],["SPD",card.spd,"#00ffaa"]];
  stats.forEach(([label,val,col],i)=>{
    const sx=22+i*(W-10)/3;
    ctx.fillStyle=col;ctx.font=`900 13px Arial`;ctx.textAlign="center";ctx.fillText(val,sx,statsY+8);
    ctx.fillStyle="rgba(200,200,220,0.6)";ctx.font=`6px Arial`;ctx.fillText(label,sx,statsY+18);
  });

  // LOGO watermark
  ctx.fillStyle="rgba(255,255,255,0.18)";ctx.font=`5px Arial`;ctx.textAlign="right";
  ctx.fillText("KIDFOREVER",W-8,H-6);

  ctx.restore();

  const div=document.createElement("div");div.style.cssText="display:inline-block;border-radius:12px;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,0.5);";
  div.appendChild(c);return div;
}

function buildBack(){
  const W=180,H=252;
  const c=document.createElement("canvas");c.width=W;c.height=H;
  const ctx=c.getContext("2d");
  ctx.save();ctx.beginPath();ctx.roundRect(0,0,W,H,12);ctx.clip();

  // bg
  ctx.fillStyle="#03020a";ctx.fillRect(0,0,W,H);

  // galaxy layers
  const g1=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,100);
  g1.addColorStop(0,"#0a0025");g1.addColorStop(1,"transparent");
  ctx.fillStyle=g1;ctx.fillRect(0,0,W,H);

  // stars
  for(let i=0;i<80;i++){
    ctx.fillStyle=i%5===0?"rgba(255,204,0,0.7)":i%5===1?"rgba(187,51,255,0.5)":"rgba(255,255,255,0.5)";
    ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H,Math.random()*1.2+0.2,0,Math.PI*2);ctx.fill();
  }

  // outer border
  ctx.strokeStyle="#ffcc00";ctx.lineWidth=2;ctx.globalAlpha=0.5;
  ctx.beginPath();ctx.roundRect(4,4,W-8,H-8,9);ctx.stroke();
  // inner border
  ctx.lineWidth=0.8;ctx.globalAlpha=0.2;
  ctx.beginPath();ctx.roundRect(10,10,W-20,H-20,6);ctx.stroke();
  ctx.globalAlpha=1;

  // radial energy lines
  ctx.strokeStyle="rgba(255,204,0,0.12)";ctx.lineWidth=1;
  for(let i=0;i<12;i++){const a=i*30*Math.PI/180;ctx.beginPath();ctx.moveTo(W/2,H/2);ctx.lineTo(W/2+Math.cos(a)*120,H/2+Math.sin(a)*120);ctx.stroke();}

  // rings
  [[50,"#ffcc00",0.2],[65,"#bb33ff",0.15],[80,"#ff2244",0.1]].forEach(([r,col,a])=>{
    ctx.strokeStyle=col;ctx.lineWidth=1;ctx.globalAlpha=a;ctx.beginPath();ctx.arc(W/2,H/2,r,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
  });

  // hexagon shield
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;ctx.lineTo(W/2+Math.cos(a)*38,H/2+Math.sin(a)*38);}
  ctx.closePath();ctx.fillStyle="#0a001a";ctx.fill();ctx.strokeStyle="#ffcc00";ctx.lineWidth=2;ctx.globalAlpha=0.9;ctx.stroke();ctx.globalAlpha=1;

  // inner hex
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;ctx.lineTo(W/2+Math.cos(a)*33,H/2+Math.sin(a)*33);}
  ctx.closePath();ctx.strokeStyle="#ffcc00";ctx.lineWidth=0.6;ctx.globalAlpha=0.3;ctx.stroke();ctx.globalAlpha=1;

  // lightning bolt
  ctx.fillStyle="#ffcc00";ctx.globalAlpha=0.95;
  ctx.beginPath();ctx.moveTo(W/2+6,H/2-22);ctx.lineTo(W/2-6,H/2+2);ctx.lineTo(W/2+2,H/2+2);ctx.lineTo(W/2-6,H/2+22);ctx.lineTo(W/2+6,H/2-2);ctx.lineTo(W/2-2,H/2-2);ctx.closePath();ctx.fill();ctx.globalAlpha=1;

  // corner stars
  [[20,20],[W-20,20],[20,H-20],[W-20,H-20]].forEach(([sx,sy])=>{
    ctx.fillStyle="rgba(255,204,0,0.5)";ctx.beginPath();
    for(let i=0;i<10;i++){const a=i*Math.PI/5-Math.PI/2;const r=i%2===0?8:4;ctx.lineTo(sx+Math.cos(a)*r,sy+Math.sin(a)*r);}
    ctx.closePath();ctx.fill();
  });

  // side gems
  [[8,H/2],[W-8,H/2]].forEach(([gx,gy])=>{
    const gg=ctx.createRadialGradient(gx,gy,0,gx,gy,5);
    gg.addColorStop(0,"#fff");gg.addColorStop(0.4,"#dd66ff");gg.addColorStop(1,"rgba(170,0,255,0)");
    ctx.fillStyle=gg;ctx.beginPath();ctx.arc(gx,gy,5,0,Math.PI*2);ctx.fill();
  });

  // top/bottom text
  ctx.fillStyle="#ffcc00";ctx.font=`900 8px Arial`;ctx.textAlign="center";ctx.globalAlpha=0.9;
  ctx.fillText("KIDFOREVER",W/2,32);
  ctx.font=`6px Arial`;ctx.globalAlpha=0.4;ctx.fillText("CARDS",W/2,42);
  ctx.font=`900 8px Arial`;ctx.globalAlpha=0.9;ctx.fillText("KIDFOREVER",W/2,H-22);
  ctx.font=`6px Arial`;ctx.globalAlpha=0.4;ctx.fillText("CARDS",W/2,H-12);
  ctx.globalAlpha=1;

  ctx.restore();
  const div=document.createElement("div");div.style.cssText="display:inline-block;border-radius:12px;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,0.5);";div.appendChild(c);return div;
}

const frontSheet=document.getElementById("fronts");
const backSheet=document.getElementById("backs");
CARDS.forEach(card=>{
  frontSheet.appendChild(buildCard(card));
  backSheet.appendChild(buildBack());
});
</script>
