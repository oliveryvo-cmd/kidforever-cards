<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KidForever Cards — Print Sheet</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#e8e8e8;font-family:'Segoe UI',Arial,sans-serif;padding:20px;}
h1{font-size:1rem;margin-bottom:4px;color:#333;}
p{font-size:0.7rem;color:#666;margin-bottom:12px;}
.sheet{display:grid;grid-template-columns:repeat(3,200px);gap:12px;justify-content:center;margin-bottom:16px;}
.cut-line{border:1px dashed #bbb;margin:14px 0;}
.instructions{font-size:0.65rem;color:#888;margin:8px 0;text-align:center;}
canvas{display:block;}
@media print{
  body{padding:6px;background:#fff;}
  h1,p,.instructions,.no-print{display:none;}
  .cut-line{border-color:#ddd;}
}
</style>
</head>
<body>
<h1>KidForever Cards — Print Sheet</h1>
<p>Print on cardstock · Cut out · 5 per envelope · Sell for $5</p>
<button class="no-print" onclick="window.print()" style="margin-bottom:16px;padding:10px 28px;background:linear-gradient(135deg,#ffcc00,#ff2244);border:none;border-radius:50px;font-size:0.8rem;font-weight:900;cursor:pointer;">🖨️ PRINT NOW</button>
<div class="instructions">✂️ CARD FRONTS</div>
<div class="sheet" id="fronts"></div>
<div class="cut-line"></div>
<div class="instructions">✂️ CARD BACKS — print on reverse side</div>
<div class="sheet" id="backs"></div>

// ── BACKGROUNDS ────────────────────────────────────────────────────────────────
function bgStorm(ctx,w,h,c){
  const g=ctx.createLinearGradient(0,0,w,h);
  g.addColorStop(0,"#0a0800");g.addColorStop(1,"#1a1400");
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  ctx.strokeStyle="rgba(255,204,0,0.18)";ctx.lineWidth=1;
  for(let i=0;i<6;i++){ctx.beginPath();const x=Math.random()*w;ctx.moveTo(x,0);ctx.lineTo(x+20,h/2);ctx.lineTo(x-10,h);ctx.stroke();}
  const rg=ctx.createRadialGradient(w/2,h*0.6,0,w/2,h*0.6,w*0.7);
  rg.addColorStop(0,"rgba(255,204,0,0.18)");rg.addColorStop(1,"transparent");
  ctx.fillStyle=rg;ctx.fillRect(0,0,w,h);
  for(let i=0;i<30;i++){ctx.fillStyle=`rgba(255,220,0,${Math.random()*0.5+0.1})`;ctx.beginPath();ctx.arc(Math.random()*w,Math.random()*h,Math.random()*1+0.3,0,Math.PI*2);ctx.fill();}
}
function bgLava(ctx,w,h){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,"#080000");g.addColorStop(1,"#1a0000");
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  for(let i=0;i<20;i++){ctx.fillStyle=`rgba(255,${Math.floor(Math.random()*80)},0,${Math.random()*0.6+0.2})`;ctx.beginPath();ctx.arc(Math.random()*w,Math.random()*h,Math.random()*2.5+0.5,0,Math.PI*2);ctx.fill();}
  const rg=ctx.createRadialGradient(w/2,h*0.5,0,w/2,h*0.5,w*0.8);
  rg.addColorStop(0,"rgba(255,60,0,0.2)");rg.addColorStop(1,"transparent");
  ctx.fillStyle=rg;ctx.fillRect(0,0,w,h);
  ctx.strokeStyle="rgba(255,80,0,0.3)";ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,h-10);ctx.lineTo(w*0.3,h-20);ctx.lineTo(w*0.6,h-8);ctx.lineTo(w,h-15);ctx.stroke();
}
function bgMagic(ctx,w,h){
  const g=ctx.createLinearGradient(0,0,w,h);
  g.addColorStop(0,"#080012");g.addColorStop(1,"#120020");
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  for(let i=0;i<40;i++){
    const cols=["rgba(187,51,255,0.7)","rgba(255,204,0,0.6)","rgba(255,100,200,0.5)"];
    ctx.fillStyle=cols[i%3];ctx.beginPath();ctx.arc(Math.random()*w,Math.random()*h,Math.random()*2,0,Math.PI*2);ctx.fill();
  }
  const rg=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,w*0.6);
  rg.addColorStop(0,"rgba(170,0,255,0.2)");rg.addColorStop(1,"transparent");
  ctx.fillStyle=rg;ctx.fillRect(0,0,w,h);
}
function bgCity(ctx,w,h){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,"#000510");g.addColorStop(1,"#001028");
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  ctx.fillStyle="#000820";
  [[0,h-25,18],[20,h-45,16],[38,h-30,14],[54,h-55,20],[76,h-35,14],[92,h-50,18],[112,h-28,15],[130,h-42,w-130]].forEach(([x,y,bw])=>ctx.fillRect(x,y,bw,h));
  ctx.fillStyle="rgba(0,200,255,0.55)";
  for(let i=0;i<28;i++)ctx.fillRect(Math.random()*(w-3),h-50+Math.random()*42,2,2);
  ctx.strokeStyle="rgba(0,120,255,0.25)";ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(0,h*0.45);ctx.lineTo(w,h*0.45);ctx.stroke();
}
function bgNight(ctx,w,h){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,"#020006");g.addColorStop(1,"#08000f");
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  ctx.fillStyle="rgba(180,150,220,0.12)";ctx.beginPath();ctx.arc(w-22,18,14,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#020006";ctx.beginPath();ctx.arc(w-16,16,11,0,Math.PI*2);ctx.fill();
  for(let i=0;i<35;i++){ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.45+0.1})`;ctx.beginPath();ctx.arc(Math.random()*w,Math.random()*h*0.85,Math.random()*0.9,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle="rgba(80,0,100,0.25)";ctx.beginPath();ctx.ellipse(w/2,h-6,45,7,0,0,Math.PI*2);ctx.fill();
}
function bgSky(ctx,w,h){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,"#000c28");g.addColorStop(1,"#001560");
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  ctx.fillStyle="rgba(80,130,220,0.1)";
  [[18,25,38,13],[65,18,50,16],[25,44,30,10],[95,36,42,12]].forEach(([x,y,rx,ry])=>{ctx.beginPath();ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2);ctx.fill();});
  for(let i=0;i<22;i++){ctx.fillStyle=`rgba(200,220,255,${Math.random()*0.55+0.15})`;ctx.beginPath();ctx.arc(Math.random()*w,Math.random()*h*0.55,Math.random()*0.9,0,Math.PI*2);ctx.fill();}
}
function bgMetal(ctx,w,h){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,"#0a0a0a");g.addColorStop(1,"#1c1c1c");
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  ctx.strokeStyle="rgba(160,160,180,0.1)";ctx.lineWidth=0.8;
  for(let i=0;i<12;i++){ctx.beginPath();const a=i*30*Math.PI/180;ctx.moveTo(w/2,h/2);ctx.lineTo(w/2+Math.cos(a)*120,h/2+Math.sin(a)*120);ctx.stroke();}
  ctx.strokeStyle="rgba(180,180,200,0.15)";ctx.lineWidth=0.6;
  ctx.beginPath();ctx.moveTo(0,h-12);ctx.lineTo(w*0.35,h-22);ctx.lineTo(w*0.65,h-10);ctx.lineTo(w,h-18);ctx.stroke();
}
function bgThunder(ctx,w,h){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,"#080600");g.addColorStop(1,"#141000");
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  ctx.strokeStyle="rgba(255,200,0,0.12)";ctx.lineWidth=1;
  [[10,0,18,h],[45,0,38,h],[80,0,90,h],[118,0,110,h]].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo((x1+x2)/2,h/2);ctx.lineTo(x2,y2);ctx.stroke();});
  const rg=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,55);
  rg.addColorStop(0,"rgba(255,200,0,0.14)");rg.addColorStop(1,"transparent");
  ctx.fillStyle=rg;ctx.fillRect(0,0,w,h);
}
function bgGrass(ctx,w,h){
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,"#001508");g.addColorStop(1,"#002a10");
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  ctx.strokeStyle="rgba(50,180,70,0.3)";ctx.lineWidth=1.2;
  for(let i=0;i<18;i++){const x=Math.random()*w;ctx.beginPath();ctx.moveTo(x,h);ctx.quadraticCurveTo(x+Math.random()*8-4,h-18,x+Math.random()*6-3,h-28);ctx.stroke();}
  for(let i=0;i<14;i++){ctx.fillStyle=`rgba(80,240,80,${Math.random()*0.45+0.15})`;ctx.beginPath();ctx.arc(Math.random()*w,Math.random()*h*0.85,Math.random()*1.3,0,Math.PI*2);ctx.fill();}
}

// ── CHARACTERS ─────────────────────────────────────────────────────────────────
function charOliver(ctx,cx,cy,s){
  // cape
  ctx.fillStyle="#e89000";ctx.beginPath();ctx.moveTo(cx-18*s,cy-4*s);ctx.quadraticCurveTo(cx-26*s,cy+22*s,cx-20*s,cy+44*s);ctx.lineTo(cx+20*s,cy+44*s);ctx.quadraticCurveTo(cx+26*s,cy+22*s,cx+18*s,cy-4*s);ctx.fill();
  ctx.fillStyle="rgba(255,180,0,0.3)";ctx.beginPath();ctx.moveTo(cx-18*s,cy-4*s);ctx.quadraticCurveTo(cx-22*s,cy+15*s,cx-18*s,cy+44*s);ctx.lineTo(cx-12*s,cy+44*s);ctx.quadraticCurveTo(cx-16*s,cy+15*s,cx-12*s,cy-4*s);ctx.fill();
  // body
  ctx.fillStyle="#f5c800";ctx.beginPath();ctx.roundRect(cx-13*s,cy-5*s,26*s,28*s,4*s);ctx.fill();
  ctx.fillStyle="rgba(255,240,100,0.3)";ctx.beginPath();ctx.roundRect(cx-13*s,cy-5*s,8*s,28*s,4*s);ctx.fill();
  // chest star
  ctx.fillStyle="#ee1133";const sp=[0,1,2,3,4].map(i=>{const a=i*72*Math.PI/180-Math.PI/2;return[[cx+Math.cos(a)*9*s,cy+10*s+Math.sin(a)*9*s],[cx+Math.cos(a+36*Math.PI/180)*4*s,cy+10*s+Math.sin(a+36*Math.PI/180)*4*s]];}).flat();
  ctx.beginPath();sp.forEach(([x,y],i)=>i?ctx.lineTo(x,y):ctx.moveTo(x,y));ctx.closePath();ctx.fill();
  // head
  ctx.fillStyle="#ffe0b2";ctx.beginPath();ctx.arc(cx,cy-18*s,13*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="rgba(200,120,60,0.15)";ctx.beginPath();ctx.ellipse(cx+4*s,cy-16*s,7*s,9*s,0.3,0,Math.PI*2);ctx.fill();
  // hair
  ctx.fillStyle="#3a1e00";ctx.beginPath();ctx.moveTo(cx-13*s,cy-24*s);ctx.quadraticCurveTo(cx,cy-36*s,cx+13*s,cy-24*s);ctx.quadraticCurveTo(cx+7*s,cy-30*s,cx,cy-28*s);ctx.quadraticCurveTo(cx-7*s,cy-30*s,cx-13*s,cy-24*s);ctx.fill();
  // eyes
  [[cx-5*s,cy-18*s],[cx+5*s,cy-18*s]].forEach(([ex,ey])=>{
    ctx.fillStyle="#222";ctx.beginPath();ctx.arc(ex,ey,2.8*s,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(ex-0.8*s,ey-0.8*s,0.9*s,0,Math.PI*2);ctx.fill();
  });
  // eyebrows
  ctx.strokeStyle="#3a1e00";ctx.lineWidth=1.2*s;
  ctx.beginPath();ctx.moveTo(cx-7*s,cy-22*s);ctx.lineTo(cx-3*s,cy-21*s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+7*s,cy-22*s);ctx.lineTo(cx+3*s,cy-21*s);ctx.stroke();
  // smile
  ctx.strokeStyle="#c8703a";ctx.lineWidth=1.4*s;ctx.beginPath();ctx.arc(cx,cy-14*s,4.5*s,0.25,Math.PI-0.25);ctx.stroke();
  // crown
  ctx.fillStyle="#ffcc00";ctx.beginPath();ctx.moveTo(cx-10*s,cy-30*s);ctx.lineTo(cx-8*s,cy-40*s);ctx.lineTo(cx-2*s,cy-34*s);ctx.lineTo(cx,cy-43*s);ctx.lineTo(cx+2*s,cy-34*s);ctx.lineTo(cx+8*s,cy-40*s);ctx.lineTo(cx+10*s,cy-30*s);ctx.closePath();ctx.fill();
  ctx.fillStyle="#ffee44";ctx.beginPath();ctx.arc(cx,cy-42*s,2.5*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#ffee44";ctx.beginPath();ctx.arc(cx-7.5*s,cy-39*s,1.8*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+7.5*s,cy-39*s,1.8*s,0,Math.PI*2);ctx.fill();
  // lightning arms
  ctx.strokeStyle="#ffcc00";ctx.lineWidth=2.2*s;ctx.lineCap="round";
  ctx.beginPath();ctx.moveTo(cx-13*s,cy+2*s);ctx.lineTo(cx-24*s,cy+12*s);ctx.lineTo(cx-19*s,cy+14*s);ctx.lineTo(cx-26*s,cy+26*s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+13*s,cy+2*s);ctx.lineTo(cx+24*s,cy+12*s);ctx.lineTo(cx+19*s,cy+14*s);ctx.lineTo(cx+26*s,cy+26*s);ctx.stroke();
  // legs
  ctx.fillStyle="#2244aa";ctx.fillRect(cx-11*s,cy+22*s,9*s,18*s);ctx.fillRect(cx+2*s,cy+22*s,9*s,18*s);
  ctx.fillStyle="#1133aa";ctx.fillRect(cx-13*s,cy+36*s,12*s,5*s);ctx.fillRect(cx+1*s,cy+36*s,12*s,5*s);
}

function charDragon(ctx,cx,cy,s){
  // tail
  ctx.fillStyle="#bb1100";ctx.beginPath();ctx.moveTo(cx+14*s,cy+18*s);ctx.quadraticCurveTo(cx+42*s,cy+5*s,cx+48*s,cy-10*s);ctx.quadraticCurveTo(cx+50*s,cy-18*s,cx+38*s,cy-16*s);ctx.quadraticCurveTo(cx+43*s,cy-8*s,cx+33*s,cy+4*s);ctx.quadraticCurveTo(cx+18*s,cy+14*s,cx+14*s,cy+18*s);ctx.fill();
  // wing left
  ctx.fillStyle="#7a0000";ctx.beginPath();ctx.moveTo(cx-8*s,cy-3*s);ctx.quadraticCurveTo(cx-48*s,cy-28*s,cx-44*s,cy-50*s);ctx.quadraticCurveTo(cx-28*s,cy-32*s,cx-8*s,cy+5*s);ctx.fill();
  ctx.fillStyle="rgba(200,30,0,0.28)";ctx.beginPath();ctx.moveTo(cx-8*s,cy-3*s);ctx.quadraticCurveTo(cx-38*s,cy-25*s,cx-36*s,cy-44*s);ctx.quadraticCurveTo(cx-26*s,cy-30*s,cx-8*s,cy+2*s);ctx.fill();
  // wing right
  ctx.fillStyle="#7a0000";ctx.beginPath();ctx.moveTo(cx+8*s,cy-3*s);ctx.quadraticCurveTo(cx+48*s,cy-28*s,cx+44*s,cy-50*s);ctx.quadraticCurveTo(cx+28*s,cy-32*s,cx+8*s,cy+5*s);ctx.fill();
  ctx.fillStyle="rgba(200,30,0,0.28)";ctx.beginPath();ctx.moveTo(cx+8*s,cy-3*s);ctx.quadraticCurveTo(cx+38*s,cy-25*s,cx+36*s,cy-44*s);ctx.quadraticCurveTo(cx+26*s,cy-30*s,cx+8*s,cy+2*s);ctx.fill();
  // body
  ctx.fillStyle="#cc1100";ctx.beginPath();ctx.ellipse(cx,cy+10*s,19*s,23*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#ff5533";ctx.beginPath();ctx.ellipse(cx+2*s,cy+14*s,12*s,16*s,0.1,0,Math.PI*2);ctx.fill();
  // belly scales
  ctx.fillStyle="rgba(255,120,80,0.3)";for(let i=0;i<4;i++){ctx.beginPath();ctx.ellipse(cx+2*s,cy+(2+i*6)*s,9*s,3.5*s,0,0,Math.PI*2);ctx.fill();}
  // neck
  ctx.fillStyle="#cc1100";ctx.beginPath();ctx.moveTo(cx-7*s,cy-12*s);ctx.lineTo(cx+7*s,cy-12*s);ctx.lineTo(cx+5*s,cy-28*s);ctx.lineTo(cx-5*s,cy-28*s);ctx.fill();
  // head
  ctx.fillStyle="#cc1100";ctx.beginPath();ctx.ellipse(cx,cy-36*s,15*s,12*s,0,0,Math.PI*2);ctx.fill();
  // snout
  ctx.fillStyle="#bb1100";ctx.beginPath();ctx.ellipse(cx+5*s,cy-32*s,7*s,5*s,0.3,0,Math.PI*2);ctx.fill();
  // nostrils
  ctx.fillStyle="#880000";ctx.beginPath();ctx.ellipse(cx+7*s,cy-30*s,1.5*s,1*s,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+10*s,cy-31*s,1.5*s,1*s,0,0,Math.PI*2);ctx.fill();
  // horns
  ctx.fillStyle="#770000";ctx.beginPath();ctx.moveTo(cx-7*s,cy-46*s);ctx.lineTo(cx-11*s,cy-58*s);ctx.lineTo(cx-4*s,cy-47*s);ctx.fill();
  ctx.beginPath();ctx.moveTo(cx+7*s,cy-46*s);ctx.lineTo(cx+11*s,cy-58*s);ctx.lineTo(cx+4*s,cy-47*s);ctx.fill();

  ctx.fillStyle="#bb7700";ctx.beginPath();ctx.moveTo(cx-17*s,cy-20*s);ctx.quadraticCurveTo(cx-24*s,cy,ctx-19*s,cy+20*s);ctx.quadraticCurveTo(cx-9*s,cy+38*s,cx,cy+40*s);ctx.quadraticCurveTo(cx+9*s,cy+38*s,cx+19*s,cy+20*s);ctx.quadraticCurveTo(ctx+24*s,cy,cx+17*s,cy-20*s);ctx.quadraticCurveTo(cx,cy-32*s,cx-17*s,cy-20*s);ctx.fill();
  // scales
  ctx.fillStyle="rgba(255,180,0,0.35)";[[cx-10*s,cy-14*s],[cx+5*s,cy-20*s],[cx-15*s,cy],[cx+12*s,cy-4*s],[cx-8*s,cy+15*s],[cx+10*s,cy+12*s]].forEach(([sx,sy])=>{ctx.beginPath();ctx.ellipse(sx,sy,8*s,5*s,-0.3,0,Math.PI);ctx.fill();});
  const belly=ctx.createLinearGradient(cx,cy-10*s,cx,cy+30*s);
  belly.addColorStop(0,"#ffee66");belly.addColorStop(1,"#ddaa00");
  ctx.fillStyle=belly;ctx.beginPath();ctx.ellipse(cx,cy+10*s,10*s,20*s,0,0,Math.PI*2);ctx.fill();
  [[cx-7*s,cy-18*s],[cx+7*s,cy-18*s]].forEach(([ex,ey])=>{
    ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(ex,ey,5*s,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#ffcc00";ctx.beginPath();ctx.arc(ex,ey,3.5*s,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#220000";ctx.beginPath();ctx.ellipse(ex,ey,1.5*s,2.8*s,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(ex-1*s,ey-1*s,1*s,0,Math.PI*2);ctx.fill();
  });
  ctx.strokeStyle="#885500";ctx.lineWidth=1.4*s;ctx.beginPath();ctx.arc(cx,cy-12*s,4.5*s,0.2,Math.PI-0.2);ctx.stroke();
  // electric bolts
  ctx.strokeStyle="#ffdd00";ctx.lineWidth=2*s;ctx.lineCap="round";ctx.lineJoin="round";
  [[cx-30*s,cy-8*s,-12],[cx+30*s,cy-8*s,12],[cx-28*s,cy+10*s,-10],[cx+28*s,cy+10*s,10]].forEach(([bx,by,d])=>{
    ctx.beginPath();ctx.moveTo(bx+d*s,by-8*s);ctx.lineTo(bx,by);ctx.lineTo(bx+d*s,by+8*s);ctx.stroke();
    ctx.beginPath();ctx.arc(bx,by,2.5*s,0,Math.PI*2);
    const eg=ctx.createRadialGradient(bx,by,0,bx,by,5*s);eg.addColorStop(0,"rgba(255,240,0,0.8)");eg.addColorStop(1,"transparent");ctx.fillStyle=eg;ctx.fill();
  });
  ctx.fillStyle="#bb7700";ctx.beginPath();ctx.moveTo(cx-5*s,cy+38*s);ctx.quadraticCurveTo(cx,cy+50*s,cx+5*s,cy+38*s);ctx.fill();
  ctx.strokeStyle="#ffdd00";ctx.lineWidth=1.5*s;ctx.beginPath();ctx.moveTo(cx-4*s,cy+42*s);ctx.lineTo(cx-6*s,cy+52*s);ctx.moveTo(cx,cy+44*s);ctx.lineTo(cx,cy+53*s);ctx.moveTo(cx+4*s,cy+42*s);ctx.lineTo(cx+6*s,cy+52*s);ctx.stroke();
}

function charShelly(ctx,cx,cy,s){
  ctx.fillStyle="#3d9922";[[cx-20*s,cy+16*s,-0.2],[cx+20*s,cy+16*s,0.2],[cx-18*s,cy+30*s,0.1],[cx+18*s,cy+30*s,-0.1]].forEach(([lx,ly,a])=>{ctx.save();ctx.translate(lx,ly);ctx.rotate(a);ctx.beginPath();ctx.ellipse(0,0,10*s,6*s,0,0,Math.PI*2);ctx.fill();ctx.restore();});
  ctx.strokeStyle="#1e6011";ctx.lineWidth=1.5*s;ctx.lineCap="round";
  [[cx-28*s,cy+16*s],[cx+28*s,cy+16*s]].forEach(([bx,by])=>{
    [-4,-1,2].forEach(d=>{ctx.beginPath();ctx.moveTo(bx+d*s,by);ctx.lineTo(bx+(d+(bx>cx?1.5:-1.5))*s,by+7*s);ctx.stroke();});
  });
  // shell
  ctx.fillStyle="#0e5519";ctx.beginPath();ctx.ellipse(cx,cy,28*s,22*s,0,0,Math.PI*2);ctx.fill();
  const sg=ctx.createRadialGradient(cx-8*s,cy-8*s,0,cx,cy,30*s);
  sg.addColorStop(0,"#3daa44");sg.addColorStop(0.5,"#1e7722");sg.addColorStop(1,"#0a3d11");
  ctx.fillStyle=sg;ctx.beginPath();ctx.ellipse(cx,cy,26*s,20*s,0,0,Math.PI*2);ctx.fill();
  // hex pattern
  ctx.strokeStyle="#33aa44";ctx.lineWidth=1*s;
  [[cx,cy,12],[cx-16*s,cy-4*s,8],[cx+16*s,cy-4*s,8],[cx-8*s,cy+12*s,8],[cx+8*s,cy+12*s,8]].forEach(([hx,hy,hr])=>{
    ctx.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;ctx.lineTo(hx+Math.cos(a)*hr*s,hy+Math.sin(a)*hr*s);}ctx.closePath();ctx.stroke();
  });
  // highlight
  ctx.fillStyle="rgba(100,230,100,0.18)";ctx.beginPath();ctx.ellipse(cx-10*s,cy-8*s,10*s,7*s,-0.3,0,Math.PI*2);ctx.fill();
  // head
  ctx.fillStyle="#3d9922";ctx.beginPath();ctx.arc(cx,cy-28*s,12*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="rgba(80,200,80,0.2)";ctx.beginPath();ctx.ellipse(cx-3*s,cy-30*s,6*s,8*s,-0.2,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle="#5dcc44";ctx.lineWidth=2*s;ctx.beginPath();ctx.moveTo(cx-10*s,cy-33*s);ctx.quadraticCurveTo(cx,cy-37*s,cx+10*s,cy-33*s);ctx.stroke();
  ctx.fillStyle="#3d9922";ctx.fillRect(cx-6*s,cy-18*s,12*s,8*s);
  [[cx-5*s,cy-28*s],[cx+5*s,cy-28*s]].forEach(([ex,ey])=>{
    ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(ex,ey,4.5*s,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#002a00";ctx.beginPath();ctx.arc(ex,ey,3*s,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(ex-1*s,ey-1*s,1*s,0,Math.PI*2);ctx.fill();
  });
  ctx.strokeStyle="#1e6011";ctx.lineWidth=1.5*s;ctx.beginPath();ctx.arc(cx,cy-23*s,4*s,0.2,Math.PI-0.2);ctx.stroke();
  ctx.fillStyle="#3d9922";ctx.beginPath();ctx.moveTo(cx-5*s,cy+20*s);ctx.quadraticCurveTo(cx,cy+30*s,cx+5*s,cy+20*s);ctx.fill();
}

// ── CARD RENDERER ──────────────────────────────────────────────────────────────
function buildCard(card){
  const W=200,H=280;
  const c=document.createElement("canvas");c.width=W;c.height=H;
  const ctx=c.getContext("2d");

  ctx.save();ctx.beginPath();ctx.roundRect(0,0,W,H,14);ctx.clip();

  // Outer metallic border
  const ob=ctx.createLinearGradient(0,0,W,H);
  if(card.rarity==="LEGENDARY"){
    ob.addColorStop(0,"#fff8b0");ob.addColorStop(0.25,card.typeMid);ob.addColorStop(0.5,"#fff8b0");ob.addColorStop(0.75,card.typeMid);ob.addColorStop(1,"#fff8b0");
  } else if(card.rarity==="EPIC"){
    ob.addColorStop(0,"#e0c0ff");ob.addColorStop(0.5,card.typeMid);ob.addColorStop(1,"#e0c0ff");
  } else if(card.rarity==="RARE"){
    ob.addColorStop(0,"#c0d8ff");ob.addColorStop(0.5,card.typeMid);ob.addColorStop(1,"#c0d8ff");
  } else {
    ob.addColorStop(0,"#cccccc");ob.addColorStop(0.5,"#aaaaaa");ob.addColorStop(1,"#cccccc");
  }
  ctx.fillStyle=ob;ctx.fillRect(0,0,W,H);

  // Foil shimmer for Legendary
  if(card.rarity==="LEGENDARY"){
    const fg=ctx.createLinearGradient(0,0,W,H);
    fg.addColorStop(0,"rgba(255,255,255,0)");fg.addColorStop(0.3,"rgba(255,255,255,0.22)");fg.addColorStop(0.5,"rgba(255,255,255,0.38)");fg.addColorStop(0.7,"rgba(255,255,255,0.22)");fg.addColorStop(1,"rgba(255,255,255,0)");
    ctx.fillStyle=fg;ctx.fillRect(0,0,W,H);
  }

  // Inner card bg
  ctx.fillStyle="#f8f4e8";ctx.beginPath();ctx.roundRect(7,7,W-14,H-14,10);ctx.fill();

  // Type color stripe at top
  const th=44;
  const tg=ctx.createLinearGradient(7,7,W-7,7+th);
  tg.addColorStop(0,card.typeDark);tg.addColorStop(0.5,card.typeColor);tg.addColorStop(1,card.typeDark);
  ctx.fillStyle=tg;ctx.beginPath();ctx.roundRect(7,7,W-14,th,{topLeft:10,topRight:10,bottomLeft:0,bottomRight:0});ctx.fill();

  // texture overlay on header
  ctx.fillStyle="rgba(255,255,255,0.06)";
  for(let i=0;i<12;i++){ctx.fillRect(7+i*(W-14)/12,7,1,(W-14)/12);}

  // Card name
  ctx.fillStyle="#ffffff";ctx.font=`900 13px 'Segoe UI',Arial`;ctx.textAlign="left";
  ctx.shadowColor="rgba(0,0,0,0.6)";ctx.shadowBlur=4;
  ctx.fillText(card.name,15,26);ctx.shadowBlur=0;

  // Type emoji
  ctx.font="12px Arial";ctx.textAlign="right";
  ctx.fillText(card.type,W-14,26);

  // HP
  ctx.font=`700 9px Arial`;ctx.fillStyle="rgba(255,255,255,0.85)";ctx.textAlign="right";
  ctx.fillText("HP",W-28,26);
  ctx.font=`900 14px Arial`;ctx.fillStyle="#ffffff";ctx.textAlign="right";
  ctx.fillText(card.hp,W-14,26);

  // Stage / rarity
  ctx.font=`700 7px Arial`;ctx.fillStyle="rgba(255,255,255,0.75)";ctx.textAlign="left";
  ctx.fillText(card.rarity,15,39);

  // Art frame
  const artX=9,artY=52,artW=W-18,artH=108;
  // art shadow
  ctx.fillStyle="rgba(0,0,0,0.3)";ctx.beginPath();ctx.roundRect(artX+2,artY+2,artW,artH,4);ctx.fill();
  ctx.save();ctx.beginPath();ctx.roundRect(artX,artY,artW,artH,4);ctx.clip();
  if(card.useImage){
    card.drawBg(ctx,artW,artH);
    const img=new Image();
    img.src=card.useImage;
    const drawImgCover=(im)=>{
      const scale=Math.max(artW/im.naturalWidth,artH/im.naturalHeight);
      const dw=im.naturalWidth*scale,dh=im.naturalHeight*scale;
      const dx=(artW-dw)/2,dy=(artH-dh)/2;
      ctx.drawImage(im,dx,dy,dw,dh);
    };
    if(img.complete&&img.naturalWidth>0){
      drawImgCover(img);
    } else {
      img.onload=()=>{
        ctx.save();ctx.beginPath();ctx.roundRect(artX,artY,artW,artH,4);ctx.clip();
        ctx.translate(artX,artY);
        drawImgCover(img);
        ctx.restore();
      };
    }
  } else {
    card.drawBg(ctx,artW,artH);
    card.drawChar(ctx,artW/2,artH*0.62,0.75);
  }
  // art inner vignette
  const vg=ctx.createRadialGradient(artW/2,artH/2,artH*0.25,artW/2,artH/2,artH*0.75);
  vg.addColorStop(0,"transparent");vg.addColorStop(1,"rgba(0,0,0,0.35)");
  ctx.fillStyle=vg;ctx.fillRect(0,0,artW,artH);
  ctx.restore();
  // art border
  ctx.strokeStyle="rgba(0,0,0,0.5)";ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(artX,artY,artW,artH,4);ctx.stroke();

  // World badge
  const wbY=163;
  const wbg=ctx.createLinearGradient(artX,wbY,artX+artW,wbY+14);
  wbg.addColorStop(0,card.typeDark);wbg.addColorStop(0.5,card.typeColor);wbg.addColorStop(1,card.typeDark);
  ctx.fillStyle=wbg;ctx.beginPath();ctx.roundRect(artX,wbY,artW,14,3);ctx.fill();
  ctx.fillStyle="#fff";ctx.font=`700 7px Arial`;ctx.textAlign="center";
  ctx.shadowColor="rgba(0,0,0,0.5)";ctx.shadowBlur=3;
  ctx.fillText("◆ "+card.world+" ◆",W/2,wbY+10);ctx.shadowBlur=0;

  // White info area
  ctx.fillStyle="#ffffff";ctx.beginPath();ctx.roundRect(artX,179,artW,H-186,{bottomLeft:10,bottomRight:10,topLeft:2,topRight:2});ctx.fill();
  ctx.strokeStyle="rgba(0,0,0,0.08)";ctx.lineWidth=0.8;ctx.beginPath();ctx.roundRect(artX,179,artW,H-186,{bottomLeft:10,bottomRight:10,topLeft:2,topRight:2});ctx.stroke();

  // Move cost + name + damage
  const mvY=193;
  ctx.font=`10px Arial`;ctx.textAlign="left";ctx.fillStyle="#333";
  ctx.fillText(card.moveCost,artX+6,mvY);
  const costW=ctx.measureText(card.moveCost).width+4;
  ctx.font=`900 9px Arial`;ctx.fillStyle="#111";
  ctx.fillText(card.move,artX+6+costW,mvY);
  ctx.font=`900 13px Arial`;ctx.fillStyle="#111";ctx.textAlign="right";
  ctx.fillText(card.moveDmg,artX+artW-6,mvY);

  // desc
  ctx.font=`8px Arial`;ctx.fillStyle="#555";ctx.textAlign="left";
  const words=card.desc.split(" ");let line="",lineY=mvY+12;
  words.forEach(w=>{const test=line+w+" ";if(ctx.measureText(test).width>artW-12&&line){ctx.fillText(line.trim(),artX+6,lineY);line=w+" ";lineY+=10;}else line=test;});
  if(line)ctx.fillText(line.trim(),artX+6,lineY);

  // Divider
  const divY=226;
  ctx.strokeStyle="rgba(0,0,0,0.1)";ctx.lineWidth=0.8;ctx.beginPath();ctx.moveTo(artX+4,divY);ctx.lineTo(artX+artW-4,divY);ctx.stroke();

  // Weakness / Resistance / Retreat
  ctx.font=`6px Arial`;ctx.fillStyle="#777";ctx.textAlign="left";
  ctx.fillText("WEAKNESS",artX+6,divY+9);ctx.fillText("RESISTANCE",artX+artW*0.38,divY+9);ctx.fillText("RETREAT",artX+artW*0.7,divY+9);
  ctx.font=`700 8px Arial`;ctx.fillStyle="#333";
  ctx.fillText(card.weak,artX+6,divY+18);ctx.fillText(card.resist,artX+artW*0.38,divY+18);
  // retreat dots
  for(let i=0;i<card.retreat;i++){ctx.fillStyle="#cc2200";ctx.beginPath();ctx.arc(artX+artW*0.7+7+i*11,divY+14,4,0,Math.PI*2);ctx.fill();}
  if(card.retreat===0){ctx.font=`700 8px Arial`;ctx.fillStyle="#333";ctx.fillText("FREE",artX+artW*0.7,divY+18);}

  // Stats bar
  const stY=H-22;
  ctx.fillStyle=card.typeColor;ctx.globalAlpha=0.12;ctx.fillRect(artX,stY-10,artW,20);ctx.globalAlpha=1;
  ctx.strokeStyle=card.typeColor;ctx.globalAlpha=0.3;ctx.lineWidth=0.7;ctx.beginPath();ctx.moveTo(artX+4,stY-12);ctx.lineTo(artX+artW-4,stY-12);ctx.stroke();ctx.globalAlpha=1;
  [["ATK",card.atk,"#dd2222"],["DEF",card.def,"#2244cc"],["SPD",card.spd,"#009944"]].forEach(([label,val,col],i)=>{
    const sx=artX+14+i*(artW-8)/3;
    ctx.font=`900 10px Arial`;ctx.fillStyle=col;ctx.textAlign="left";ctx.fillText(val,sx+16,stY+1);
    ctx.font=`6px Arial`;ctx.fillStyle="#888";ctx.fillText(label,sx,stY+1);
  });

  // Card number / set watermark
  ctx.font=`6px Arial`;ctx.fillStyle="#aaa";ctx.textAlign="right";
  ctx.fillText("KIDFOREVER ©2026",W-10,H-6);

  ctx.restore();

  const wrapper=document.createElement("div");
  wrapper.style.cssText="display:inline-block;border-radius:14px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,0.4),0 2px 8px rgba(0,0,0,0.3);";
  wrapper.appendChild(c);return wrapper;
}

function buildBack(){
  const W=200,H=280;
  const c=document.createElement("canvas");c.width=W;c.height=H;
  const ctx=c.getContext("2d");
  ctx.save();ctx.beginPath();ctx.roundRect(0,0,W,H,14);ctx.clip();
  // bg
  ctx.fillStyle="#03020a";ctx.fillRect(0,0,W,H);
  const g1=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,120);
  g1.addColorStop(0,"#0c002a");g1.addColorStop(1,"transparent");
  ctx.fillStyle=g1;ctx.fillRect(0,0,W,H);
  // stars
  for(let i=0;i<90;i++){
    ctx.fillStyle=i%6===0?"rgba(255,204,0,0.7)":i%6===1?"rgba(187,51,255,0.5)":"rgba(255,255,255,0.4)";
    ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H,Math.random()*1.2+0.2,0,Math.PI*2);ctx.fill();
  }
  // metallic outer border
  const ob=ctx.createLinearGradient(0,0,W,H);
  ob.addColorStop(0,"#fff8b0");ob.addColorStop(0.25,"#ffcc00");ob.addColorStop(0.5,"#fff8b0");ob.addColorStop(0.75,"#ffcc00");ob.addColorStop(1,"#fff8b0");
  ctx.strokeStyle=ob;ctx.lineWidth=3;ctx.globalAlpha=0.8;
  ctx.beginPath();ctx.roundRect(2,2,W-4,H-4,12);ctx.stroke();
  ctx.lineWidth=0.8;ctx.globalAlpha=0.25;
  ctx.beginPath();ctx.roundRect(10,10,W-20,H-20,8);ctx.stroke();
  ctx.globalAlpha=1;
  // radial lines
  ctx.strokeStyle="rgba(255,204,0,0.1)";ctx.lineWidth=0.8;
  for(let i=0;i<16;i++){const a=i*22.5*Math.PI/180;ctx.beginPath();ctx.moveTo(W/2,H/2);ctx.lineTo(W/2+Math.cos(a)*160,H/2+Math.sin(a)*160);ctx.stroke();}
  // rings
  [[55,"#ffcc00",0.22],[70,"#bb33ff",0.15],[88,"#ff2244",0.1]].forEach(([r,col,a])=>{
    ctx.strokeStyle=col;ctx.lineWidth=1;ctx.globalAlpha=a;ctx.beginPath();ctx.arc(W/2,H/2,r,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
  });
  // hex shield
  ctx.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;ctx.lineTo(W/2+Math.cos(a)*44,H/2+Math.sin(a)*44);}
  ctx.closePath();ctx.fillStyle="#0a001a";ctx.fill();ctx.strokeStyle="#ffcc00";ctx.lineWidth=2.2;ctx.globalAlpha=0.92;ctx.stroke();ctx.globalAlpha=1;
  ctx.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;ctx.lineTo(W/2+Math.cos(a)*38,H/2+Math.sin(a)*38);}
  ctx.closePath();ctx.strokeStyle="#ffcc00";ctx.lineWidth=0.7;ctx.globalAlpha=0.28;ctx.stroke();ctx.globalAlpha=1;
  // lightning bolt
  ctx.fillStyle="#ffcc00";ctx.globalAlpha=0.96;
  ctx.beginPath();ctx.moveTo(W/2+7,H/2-26);ctx.lineTo(W/2-7,H/2+2);ctx.lineTo(W/2+3,H/2+2);ctx.lineTo(W/2-7,H/2+26);ctx.lineTo(W/2+7,H/2-2);ctx.lineTo(W/2-3,H/2-2);ctx.closePath();ctx.fill();ctx.globalAlpha=1;
  // corner stars
  [[20,22],[W-20,22],[20,H-22],[W-20,H-22]].forEach(([sx,sy])=>{
    ctx.fillStyle="rgba(255,204,0,0.55)";ctx.beginPath();
    for(let i=0;i<10;i++){const a=i*Math.PI/5-Math.PI/2;ctx.lineTo(sx+Math.cos(a)*(i%2?4:9),sy+Math.sin(a)*(i%2?4:9));}
    ctx.closePath();ctx.fill();
  });
  // side gems
  [[7,H/2],[W-7,H/2]].forEach(([gx,gy])=>{
    const gg=ctx.createRadialGradient(gx,gy,0,gx,gy,6);
    gg.addColorStop(0,"#fff");gg.addColorStop(0.45,"#dd66ff");gg.addColorStop(1,"transparent");
    ctx.fillStyle=gg;ctx.beginPath();ctx.arc(gx,gy,6,0,Math.PI*2);ctx.fill();
  });
  // text
  ctx.fillStyle="#ffcc00";ctx.font=`900 10px Arial`;ctx.textAlign="center";ctx.globalAlpha=0.92;
  ctx.fillText("KIDFOREVER",W/2,36);
  ctx.font=`700 7px Arial`;ctx.globalAlpha=0.45;ctx.fillText("TRADING CARD GAME",W/2,47);
  ctx.font=`900 10px Arial`;ctx.globalAlpha=0.92;ctx.fillText("KIDFOREVER",W/2,H-26);
  ctx.font=`700 7px Arial`;ctx.globalAlpha=0.45;ctx.fillText("TRADING CARD GAME",W/2,H-15);
  ctx.globalAlpha=1;
  ctx.restore();
  const w=document.createElement("div");w.style.cssText="display:inline-block;border-radius:14px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,0.4);";w.appendChild(c);return w;
}

const fronts=document.getElementById("fronts");
const backs=document.getElementById("backs");
Math.seedrandom=function(seed){Math.random=function(){seed=(seed*9301+49297)%233280;return seed/233280;};};
CARDS.forEach((card,i)=>{
  Math.seedrandom&&Math.seedrandom(i*1000);
  fronts.appendChild(buildCard(card));
  backs.appendChild(buildBack());
});
